item.lost-dead-heart.details = “The wilted cells of an organ that long rested, waiting… as if trying to find something to serve its purpose and have its needs.. it took somewhat a very long time that I could not even count how long it has been ever since the extinction of the living beings on this planet, as I know that this vital organ is not even supposed to withstand and survive this long.."\n\n-?????


item.lost-proto-heart.name = Proto Heart
item.lost-proto-heart.description = A special biological organ used to make biological units.
item.lost-proto-heart.details = "A once vital organ from other living beings… now stand here in possession. Origins were still unknown but it was confirmed that these hearts are able to function for a very long period of time, it’s as if it refuses to let go.. [accent]I was told that this… could change how we make mechanical robots.. like.. bioengineering..? I never really understood her intentions, even [red]they[] kept asking: [orange]What do we even need biological weapons for..?[]"\n\n[]-?????


